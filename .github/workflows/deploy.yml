name: Build & Deploy

on:
  push:
    branches: [main]

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Prod
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        env:
          PUBLIC_TINA_CLIENT_ID: ${{ secrets.TINA_CLIENT_ID }}
          TINA_TOKEN: ${{ secrets.TINA_TOKEN }}
          GITHUB_BRANCH: ${{ github.ref_name }}
          PUBLIC_SITE_URL: ${{ secrets.PUBLIC_SITE_URL }}
          PUBLIC_UMAMI_SRC: ${{ secrets.PUBLIC_UMAMI_SRC }}
          PUBLIC_UMAMI_WEBSITE_ID: ${{ secrets.PUBLIC_UMAMI_WEBSITE_ID }}
        run: pnpm run build

      - name: Deploy to Droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "dist/*"
          target: "~/portfolio-deploy"
          strip_components: 1

      - name: Execute deployment on Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            # Backup current deployment
            sudo mkdir -p ~/portfolio-backups
            if [ -d /var/www/portfolio ] && [ "$(ls -A /var/www/portfolio)" ]; then
              sudo tar -czf ~/portfolio-backups/portfolio-backup-$(date +%Y%m%d_%H%M%S).tar.gz -C /var/www/portfolio .
            fi

            # Deploy new build
            sudo rm -rf /var/www/portfolio/*
            sudo cp -r ~/portfolio-deploy/* /var/www/portfolio/

            sudo chown -R www-data:www-data /var/www/portfolio
            sudo chmod -R 755 /var/www/portfolio

            # Clean up
            rm -rf ~/portfolio-deploy

            # Keep only last 5 backups
            cd ~/portfolio-backups
            ls -t portfolio-backup-*.tar.gz 2>/dev/null | tail -n +6 | xargs -r rm --

            # Reload Nginx
            sudo nginx -t && sudo systemctl reload nginx

            echo "✅ Deployment complete!"
